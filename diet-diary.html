<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="食事ダイアリー">
<title>食事ダイアリー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f7f8fc; min-height: 100vh; padding-bottom: 80px; }

/* Header */
.header { background: #2d6a4f; color: #fff; padding: 20px 16px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.app-title { font-size: 20px; font-weight: 700; }
.app-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
.add-btn { background: #52b788; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* Rules */
.rules-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; background: #e9f5ee; border-bottom: 1px solid #c7e8d4; }
.rule { font-size: 11px; background: #fff; border: 1px solid #b7dfc8; border-radius: 20px; padding: 3px 10px; color: #2d6a4f; font-weight: 600; }

/* Cards */
.list { padding: 14px 14px 0; }
.card { background: #fff; border-radius: 12px; padding: 14px 14px 10px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
.date-label { font-size: 16px; font-weight: 700; color: #1b4332; }
.total-kcal { font-size: 15px; font-weight: 700; color: #2d6a4f; }
.badge { font-size: 11px; border-radius: 12px; padding: 2px 9px; font-weight: 600; }
.badge-ok { background: #e9f5ee; color: #2d6a4f; }
.badge-warn { background: #fff8e1; color: #b07000; }
.badge-over { background: #fdecea; color: #c0392b; }

/* Bar */
.bar-wrap { height: 7px; background: #eee; border-radius: 4px; margin-bottom: 12px; overflow: hidden; display: flex; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
.bar-over { height: 100%; background: #e05c5c; }

/* Meal grid */
.meal-grid { display: flex; gap: 8px; }
.meal-col { flex: 1; min-width: 0; }
.meal-time-label { font-size: 11px; font-weight: 700; color: #52b788; margin-bottom: 4px; }
.item-list { margin: 0; padding: 0 0 0 14px; margin-bottom: 4px; }
.item-list li { font-size: 12px; color: #333; margin-bottom: 2px; line-height: 1.5; }
.meal-cal { font-size: 12px; font-weight: 700; color: #2d6a4f; }
.meal-note { font-size: 11px; color: #888; margin-top: 2px; }
.no-meal { font-size: 12px; color: #bbb; }
.edit-btn { margin-top: 10px; background: none; border: 1px solid #d0e8da; border-radius: 6px; padding: 6px 12px; font-size: 12px; color: #2d6a4f; cursor: pointer; width: 100%; }

/* Overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center; z-index: 100; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px 16px 0 0; padding: 20px 16px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 16px; font-weight: 700; color: #1b4332; }
.close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }

/* Form */
.meal-section { background: #f7faf8; border-radius: 8px; padding: 12px; margin-top: 12px; }
.meal-section-title { font-size: 13px; font-weight: 700; color: #2d6a4f; margin-bottom: 8px; }
label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
input[type="text"], input[type="number"], input[type="date"], textarea {
  width: 100%; border-radius: 7px; border: 1px solid #d4e8dc;
  padding: 8px 10px; font-size: 14px; margin-bottom: 10px;
  outline: none; font-family: inherit;
}
textarea { resize: vertical; }
.calc-btn { width: 100%; background: #1b4332; color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
.breakdown-box { background: #fff; border: 1px solid #d4e8dc; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; }
.breakdown-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
.breakdown-total { border-top: 2px solid #d4e8dc; border-bottom: none; margin-top: 4px; padding-top: 4px; font-weight: 700; }
.breakdown-cal { color: #2d6a4f; font-weight: 600; }
.save-btn { margin-top: 16px; width: 100%; background: #2d6a4f; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
.empty { text-align: center; color: #aaa; padding: 40px 20px; font-size: 14px; }
.label-sub { color: #888; font-weight: 400; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="app-title">🥗 食事ダイアリー</div>
    <div class="app-sub">目標：1日 1300 kcal</div>
  </div>
  <button class="add-btn" onclick="openModal()">＋ 記録を追加</button>
</div>

<div class="rules-row">
  <span class="rule">🛢 油物控えめ</span>
  <span class="rule">脂質 1食10g以下</span>
  <span class="rule">タンパク質 1食20g以上</span>
  <span class="rule">🍺 週2回・1〜2杯まで</span>
  <span class="rule">1食 400kcal 前後</span>
</div>

<div class="list" id="dayList"></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">食事を記録する</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <label>日付</label>
    <input type="date" id="inputDate">

    <div id="mealForms"></div>

    <button class="save-btn" onclick="saveEntry()">💾 保存する</button>
  </div>
</div>

<script>
const TARGET = 1300;
const MEAL_TIMES = ["朝","昼","夜"];

const CALORIE_DB = {
  "ご飯":252,"ごはん":252,"白米":252,"ご飯（小）":168,"ご飯（大）":336,
  "おにぎり":170,"梅おにぎり":160,"梅昆布おにぎり":165,"しそご飯":220,
  "食パン":160,"食パン1枚":160,"トースト":170,"パン":160,
  "うどん":240,"そば":230,"ラーメン":480,"パスタ":320,
  "ソーセージ":60,"ソーセージ3本":180,"ウインナー":60,"ウインナー3本":180,
  "目玉焼き":90,"目玉焼き2個":180,"卵":75,"ゆで卵":75,"スクランブルエッグ":100,
  "焼き魚":150,"鮭":130,"さんま":210,"アジ":120,"サバ":200,
  "ハンバーグ":280,"から揚げ":300,"唐揚げ":300,"チキン":200,
  "酢豚":350,"麻婆豆腐":250,"チャーシュー":280,
  "豆腐":70,"納豆":100,"卵焼き":120,
  "サラダ":30,"野菜サラダ":30,"シーザーサラダ":150,
  "味噌汁":40,"みそ汁":40,"なめこの味噌汁":45,"豆腐の味噌汁":55,
  "スープ":50,"コンソメスープ":30,
  "ビール":150,"ハイボール":90,"ジャスミンハイ":100,"チューハイ":120,
  "ワイン":90,"日本酒":190,"焼酎":140,
  "ダイエットドリンク":10,"ゼロカロリードリンク":0,
  "コーヒー":8,"お茶":0,"水":0,"牛乳":130,"オレンジジュース":110,
  "タピオカドリンク":380,"タピオカ":380,"ミルクティー":200,
  "アイス":180,"ケーキ":320,"チョコレート":250,"クッキー":200,
  "ヨーグルト":90,"バナナ":90,"りんご":60,"みかん":45,
  "カレー":650,"カレーライス":650,"チャーハン":500,"オムライス":550,
  "親子丼":580,"牛丼":650,"天丼":700,"カツ丼":750,
  "餃子":250,"シュウマイ":200,"春巻き":220,
  "ピザ":600,"ハンバーガー":500,"フライドポテト":350,
  "寿司":350,"刺身":150,
};

function lookupCal(itemsText) {
  const lines = itemsText.split("\n").map(s=>s.trim()).filter(Boolean);
  let total = 0;
  const breakdown = [];
  for (const line of lines) {
    if (line.startsWith("※")) { breakdown.push({item:line,cal:0}); continue; }
    let cal = CALORIE_DB[line];
    if (cal === undefined) {
      const key = Object.keys(CALORIE_DB).find(k => line.includes(k) || k.includes(line));
      cal = key ? CALORIE_DB[key] : 100;
    }
    breakdown.push({item:line, cal});
    total += cal;
  }
  return {total_cal: total, breakdown};
}

// Data
const DEFAULT_DATA = [
  { date:"2025-06-12", meals:[
    {time:"朝", items:["梅昆布おにぎり","ソーセージ3本"], cal:370},
    {time:"昼", items:["ダイエットドリンク"], cal:30},
    {time:"夜", items:["ビール","ジャスミンハイ","ハイボール","※カラオケで消費"], cal:420, note:"アルコール3杯 / カラオケで運動消費あり"},
  ]},
  { date:"2025-06-13", meals:[
    {time:"朝", items:["食パン1枚","ソーセージ3本"], cal:340},
    {time:"昼", items:["ダイエットドリンク"], cal:30},
    {time:"夜", items:["ハンバーグ","ご飯（小）","なめこの味噌汁","サラダ"], cal:590},
  ]},
  { date:"2025-06-14", meals:[
    {time:"朝", items:["しそご飯","目玉焼き2個","ソーセージ3本","サラダ"], cal:490},
    {time:"昼", items:["酢豚","ご飯","タピオカドリンク"], cal:760},
    {time:"夜", items:["ダイエットドリンク"], cal:30},
  ]},
];

function loadData() {
  try {
    const saved = localStorage.getItem("diet-diary-v1");
    return saved ? JSON.parse(saved) : DEFAULT_DATA;
  } catch { return DEFAULT_DATA; }
}

function saveData(data) {
  localStorage.setItem("diet-diary-v1", JSON.stringify(data));
}

let days = loadData();
let editingDate = null;

function getLabel(date) {
  const weekdays = ["日","月","火","水","木","金","土"];
  const d = new Date(date + "T00:00:00");
  const [,mo,day] = date.split("-");
  return `${parseInt(mo)}/${parseInt(day)} (${weekdays[d.getDay()]})`;
}

function totalCal(meals) { return meals.reduce((s,m) => s+(m.cal||0), 0); }

function renderBadge(total) {
  const diff = total - TARGET;
  if (total === 0) return "";
  if (diff <= 0) return `<span class="badge badge-ok">✓ 目標内（あと${Math.abs(diff)}kcal）</span>`;
  if (diff <= 150) return `<span class="badge badge-warn">△ 少しオーバー（+${diff}kcal）</span>`;
  return `<span class="badge badge-over">✕ オーバー（+${diff}kcal）</span>`;
}

function renderBar(total) {
  const pct = Math.min((total / TARGET) * 100, 100);
  const overPct = total > TARGET ? Math.min(((total-TARGET)/TARGET)*100, 30) : 0;
  const color = total <= TARGET ? "#4caf82" : total <= TARGET+150 ? "#f0a500" : "#e05c5c";
  return `<div class="bar-wrap">
    <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
    ${overPct > 0 ? `<div class="bar-over" style="width:${overPct}%"></div>` : ""}
  </div>`;
}

function renderCard(day) {
  const total = totalCal(day.meals);
  const cols = MEAL_TIMES.map(t => {
    const meal = day.meals.find(m => m.time === t);
    if (!meal) return `<div class="meal-col"><div class="meal-time-label">${t}</div><div class="no-meal">—</div></div>`;
    const items = meal.items.map(i => `<li>${i}</li>`).join("");
    const note = meal.note ? `<div class="meal-note">📝 ${meal.note}</div>` : "";
    return `<div class="meal-col">
      <div class="meal-time-label">${t}</div>
      <ul class="item-list">${items}</ul>
      <div class="meal-cal">${meal.cal} kcal</div>
      ${note}
    </div>`;
  }).join("");

  return `<div class="card">
    <div class="card-header">
      <span class="date-label">${getLabel(day.date)}</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="total-kcal">${total} kcal</span>
        ${renderBadge(total)}
      </div>
    </div>
    ${renderBar(total)}
    <div class="meal-grid">${cols}</div>
    <button class="edit-btn" onclick="openModal('${day.date}')">✏️ この日を編集</button>
  </div>`;
}

function renderList() {
  const list = document.getElementById("dayList");
  const sorted = [...days].sort((a,b) => b.date.localeCompare(a.date));
  if (sorted.length === 0) {
    list.innerHTML = `<div class="empty">まだ記録がありません<br>「＋ 記録を追加」から始めましょう</div>`;
    return;
  }
  list.innerHTML = sorted.map(renderCard).join("");
}

// Modal
function openModal(date) {
  editingDate = date || null;
  const today = new Date();
  const pad = n => String(n).padStart(2,"0");
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  document.getElementById("modalTitle").textContent = date ? "記録を編集" : "食事を記録する";
  document.getElementById("inputDate").value = date || todayStr;

  const existing = date ? days.find(d => d.date === date) : null;
  renderMealForms(existing);
  document.getElementById("overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

function renderMealForms(existing) {
  const container = document.getElementById("mealForms");
  container.innerHTML = MEAL_TIMES.map(t => {
    const meal = existing?.meals.find(m => m.time === t);
    const items = meal ? meal.items.join("\n") : "";
    const cal = meal?.cal || "";
    const note = meal?.note || "";
    return `<div class="meal-section">
      <div class="meal-section-title">${t}ごはん</div>
      <label>メニュー（1行1品）</label>
      <textarea id="items-${t}" rows="3" placeholder="例：\nご飯（小）\n焼き魚">${items}</textarea>
      <button class="calc-btn" onclick="calcCal('${t}')">🔢 カロリーを自動計算</button>
      <div id="breakdown-${t}"></div>
      <label>カロリー (kcal) <span class="label-sub">— 自動入力後に手動修正も可</span></label>
      <input type="number" id="cal-${t}" value="${cal}" placeholder="例：400">
      <label>メモ（任意）</label>
      <input type="text" id="note-${t}" value="${note}" placeholder="例：外食、お酒ありなど">
    </div>`;
  }).join("");
}

function calcCal(t) {
  const text = document.getElementById(`items-${t}`).value.trim();
  if (!text) return;
  const result = lookupCal(text);
  document.getElementById(`cal-${t}`).value = result.total_cal;
  const rows = result.breakdown.map(b =>
    `<div class="breakdown-row"><span>${b.item}</span><span class="breakdown-cal">${b.cal} kcal</span></div>`
  ).join("");
  const total = `<div class="breakdown-row breakdown-total"><span>合計</span><span class="breakdown-cal" style="font-size:14px">${result.total_cal} kcal</span></div>`;
  document.getElementById(`breakdown-${t}`).innerHTML = `<div class="breakdown-box">${rows}${total}</div>`;
}

function saveEntry() {
  const date = document.getElementById("inputDate").value;
  if (!date) { alert("日付を入力してください"); return; }
  const meals = MEAL_TIMES.map(t => {
    const items = document.getElementById(`items-${t}`).value.trim();
    const cal = parseInt(document.getElementById(`cal-${t}`).value) || 0;
    const note = document.getElementById(`note-${t}`).value.trim();
    if (!items) return null;
    return { time: t, items: items.split("\n").map(s=>s.trim()).filter(Boolean), cal, note };
  }).filter(Boolean);

  const idx = days.findIndex(d => d.date === date);
  if (idx >= 0) days[idx] = { date, meals };
  else days.push({ date, meals });

  saveData(days);
  renderList();
  closeModal();
}

// Init
renderList();
</script>
</body>
</html>
